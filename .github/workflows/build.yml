name: Build IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Find and Build Archive
        run: |
          cd source
          # 自動取得第一個 Scheme 的名稱
          SCHEME=$(xcodebuild -list -json | jq -r '.project.schemes[0]')
          echo "Found Scheme: $SCHEME"
          
          # 執行編譯
          xcodebuild archive \
            -scheme "$SCHEME" \
            -archivePath ./iVanced.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Prepare Payload
        run: |
          mkdir -p Payload
          # 找到編譯出的 .app 檔案路徑
          APP_PATH=$(find source/iVanced.xcarchive -name "*.app" -type d)
          cp -r "$APP_PATH" Payload/
          zip -vr iVanced.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iVanced-IPA
          path: iVanced.ipa
          retention-days: 5
