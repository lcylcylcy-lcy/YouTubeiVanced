name: Build IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build Archive
        run: |
          # 進入 source 資料夾
          cd source
          
          # 尋找專案檔案 (.xcodeproj 或 .xcworkspace)
          PROJECT_FILE=$(find . -maxdepth 2 -name "*.xcodeproj" -o -name "*.xcworkspace" | head -n 1)
          echo "Found Project: $PROJECT_FILE"
          
          # 取得第一個可用的 Scheme
          SCHEME=$(xcodebuild -list -json | jq -r '.project.schemes[0] // .workspace.schemes[0]')
          echo "Using Scheme: $SCHEME"

          # 執行編譯 (加上 -allowProvisioningUpdates 增加成功率)
          xcodebuild archive \
            -scheme "$SCHEME" \
            -archivePath ./iVanced.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Prepare Payload
        run: |
          mkdir -p Payload
          # 遞迴搜尋編譯出來的 .app 檔案
          APP_PATH=$(find . -name "*.app" -type d | grep ".xcarchive" | head -n 1)
          echo "Found App Path: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -vr iVanced.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iVanced-IPA
          path: iVanced.ipa
          retention-days: 5
