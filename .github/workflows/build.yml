name: Build IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 更新到 v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build Archive
        run: |
          cd source
          # 執行編譯，跳過簽署步驟
          xcodebuild archive -scheme iVanced -archivePath ./iVanced.xcarchive -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Prepare Payload
        run: |
          mkdir -p Payload
          # 將編譯出的 .app 檔案複製到 Payload 資料夾
          cp -r source/iVanced.xcarchive/Products/Applications/*.app Payload/
          # 壓縮成 ipa
          zip -vr iVanced.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # 關鍵修正：更新到 v4
        with:
          name: iVanced-IPA
          path: iVanced.ipa
          retention-days: 5
